<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>StreamVue – IPTV Channel Browser</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #7dd3fc 30%, #38bdf8 70%, #1d4ed8 100%);
      min-height: 100vh;
      color: #0f172a;
      overflow-x: hidden;
    }

    /* ---------- Sidebar ---------- */
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(16px);
      z-index: 1000;
      transition: left 0.3s ease;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      box-shadow: 4px 0 20px rgba(0,0,0,0.3);
    }
    .sidebar.open {
      left: 0;
    }
    .sidebar .close-btn {
      align-self: flex-end;
      background: none;
      border: none;
      color: #f1f5f9;
      font-size: 1.8rem;
      cursor: pointer;
    }
    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .sidebar nav a {
      color: #e2e8f0;
      text-decoration: none;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .sidebar nav a:hover {
      background: rgba(255,255,255,0.15);
    }

    /* ---------- Overlay ---------- */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }
    .overlay.show {
      display: block;
    }

    /* ---------- Header ---------- */
    .header {
      display: flex;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hamburger {
      font-size: 1.8rem;
      color: #0f172a;
      cursor: pointer;
      margin-right: 1.5rem;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #0f172a;
    }
    .logo span {
      color: #ffffff;
      background: #1e3a8a;
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
      margin-left: 0.3rem;
    }

    /* ---------- View Container ---------- */
    .view {
      display: none;
    }
    .view.active {
      display: block;
    }

    /* ---------- Home / Category Rows ---------- */
    .category-section {
      margin: 2rem 1.5rem;
    }
    .category-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #0c1b3b;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .scroll-row {
      display: flex;
      overflow-x: auto;
      gap: 1.2rem;
      padding-bottom: 0.8rem;
      scroll-snap-type: x mandatory;
    }
    .scroll-row::-webkit-scrollbar {
      height: 6px;
    }
    .scroll-row::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
    }

    .channel-card {
      min-width: 180px;
      max-width: 200px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }
    .channel-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 28px rgba(0,0,0,0.25);
    }
    .card-img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      background: #cbd5e1;
    }
    .card-body {
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .card-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      font-size: 0.75rem;
      color: #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ping-btn {
      background: none;
      border: none;
      color: #1e3a8a;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .ping-status {
      font-weight: 600;
    }
    .status-available {
      color: #16a34a;
    }
    .status-unavailable {
      color: #dc2626;
    }

    /* ---------- Browse Grid ---------- */
    .browse-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.5rem 2rem;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      margin: 1.5rem 1.5rem 0;
      border-radius: 16px;
      align-items: center;
    }
    .search-box {
      flex: 2;
      min-width: 200px;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 30px;
      background: rgba(255,255,255,0.85);
      font-size: 1rem;
    }
    .category-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .pill {
      padding: 0.4rem 1.2rem;
      border-radius: 20px;
      background: rgba(255,255,255,0.6);
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.9rem;
    }
    .pill.active {
      background: #1e3a8a;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding-bottom: 2rem;
      align-items: center;
    }
    .pagination button {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 500;
    }
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ---------- Player Modal ---------- */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      width: 90%;
      max-width: 900px;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 10px; right: 15px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      z-index: 10;
    }
    video {
      width: 100%;
      display: block;
      max-height: 80vh;
    }

    /* ---------- About Modal ---------- */
    .about-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }
    .about-modal.active {
      display: flex;
    }
    .about-box {
      background: white;
      padding: 2rem;
      border-radius: 20px;
      max-width: 500px;
      width: 90%;
      position: relative;
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 768px) {
      .header { padding: 0.8rem 1rem; }
      .grid-container { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); padding: 1rem; }
      .browse-controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
    <nav>
      <a href="#" class="nav-home"><i class="fas fa-home"></i> Home</a>
      <a href="#" class="nav-browse"><i class="fas fa-th-large"></i> Browse All</a>
      <a href="#" class="nav-about"><i class="fas fa-info-circle"></i> About</a>
      <a href="https://t.me/blackeye47" target="_blank"><i class="fab fa-telegram"></i> Contact</a>
    </nav>
  </div>
  <div class="overlay" id="overlay"></div>

  <!-- Header -->
  <header class="header">
    <i class="fas fa-bars hamburger" id="hamburgerBtn"></i>
    <div class="logo">Stream<span>Vue</span></div>
  </header>

  <!-- Views -->
  <div class="view active" id="homeView">
    <div id="categoryRows"></div>
  </div>

  <div class="view" id="browseView">
    <div class="browse-controls">
      <input type="text" class="search-box" id="searchBox" placeholder="Search channels...">
      <div class="category-pills" id="categoryPills"></div>
    </div>
    <div class="grid-container" id="channelGrid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- Player Modal -->
  <div class="modal" id="playerModal">
    <div class="modal-content">
      <i class="fas fa-times modal-close" id="closePlayer"></i>
      <video id="videoPlayer" controls autoplay></video>
    </div>
  </div>

  <!-- About Modal -->
  <div class="about-modal" id="aboutModal">
    <div class="about-box">
      <h2>About StreamVue</h2>
      <p style="margin:1rem 0">This website lets you browse and watch live IPTV channels from the <strong>iptv-org</strong> database. You can check channel availability, play streams, and filter by category.</p>
      <p>Simply pick a channel and click to watch. Built with ❤️ for free TV.</p>
      <button style="margin-top:1rem; background:#1e3a8a; color:white; border:none; padding:0.5rem 1.5rem; border-radius:20px; cursor:pointer;" id="closeAbout">Got it</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    // ====================== GLOBALS ======================
    const PROXY = 'https://api.allorigins.win/raw?url=';
    let allChannels = [];
    let filteredChannels = [];
    let currentPage = 1;
    const pageSize = 30;
    let activeCategory = ''; // for browse filter
    let pingStatusMap = new Map(); // url -> {status: 'available'|'unavailable', checking: bool}

    // ====================== UI Toggling ======================
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      sidebar.classList.add('open');
      overlay.classList.add('show');
    });
    document.getElementById('closeSidebar').addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);
    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    }

    // Navigation links
    document.querySelector('.nav-home').addEventListener('click', (e) => {
      e.preventDefault();
      switchView('home');
      closeSidebar();
    });
    document.querySelector('.nav-browse').addEventListener('click', (e) => {
      e.preventDefault();
      switchView('browse');
      closeSidebar();
    });
    document.querySelector('.nav-about').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('aboutModal').classList.add('active');
      closeSidebar();
    });
    document.getElementById('closeAbout').addEventListener('click', () => {
      document.getElementById('aboutModal').classList.remove('active');
    });

    function switchView(view) {
      document.getElementById('homeView').classList.toggle('active', view === 'home');
      document.getElementById('browseView').classList.toggle('active', view === 'browse');
      if (view === 'browse') {
        renderBrowseView();
      }
    }

    // Player modal
    const playerModal = document.getElementById('playerModal');
    const videoPlayer = document.getElementById('videoPlayer');
    document.getElementById('closePlayer').addEventListener('click', () => {
      playerModal.classList.remove('active');
      if (window.hls) {
        window.hls.destroy();
        window.hls = null;
      }
      videoPlayer.pause();
      videoPlayer.removeAttribute('src');
      videoPlayer.load();
    });

    function playStream(url) {
      playerModal.classList.add('active');
      if (Hls.isSupported()) {
        if (window.hls) window.hls.destroy();
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(videoPlayer);
        hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                hls.startLoad(); break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                hls.recoverMediaError(); break;
              default:
                hls.destroy(); break;
            }
          }
        });
        window.hls = hls;
      } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
        videoPlayer.src = url;
        videoPlayer.play();
      } else {
        alert('Your browser does not support HLS playback.');
      }
    }

    // ====================== DATA LOADING ======================
    function parseM3U(text) {
      const lines = text.split('\n');
      const channels = [];
      let current = null;
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('#EXTINF')) {
          if (current) channels.push(current);
          const info = trimmed.substring(8);
          const commaIndex = info.indexOf(',');
          let meta = '', name = '';
          if (commaIndex >= 0) {
            meta = info.substring(0, commaIndex).trim();
            name = info.substring(commaIndex + 1).trim();
          } else {
            name = info.trim();
          }
          const getAttr = (attr) => {
            const m = meta.match(new RegExp(`${attr}="([^"]*)"`));
            return m ? m[1] : '';
          };
          current = {
            displayName: name,
            tvgId: getAttr('tvg-id'),
            tvgName: getAttr('tvg-name'),
            tvgLogo: getAttr('tvg-logo'),
            groupTitle: getAttr('group-title'),
          };
        } else if (trimmed && !trimmed.startsWith('#') && current) {
          current.url = trimmed;
          channels.push(current);
          current = null;
        }
      }
      if (current) channels.push(current);
      return channels;
    }

    async function loadPlaylist() {
      try {
        let resp = await fetch('https://iptv-org.github.io/iptv/index.m3u');
        if (!resp.ok) throw new Error('Direct fetch failed');
        const text = await resp.text();
        allChannels = parseM3U(text);
        buildHomeRows();
        setupBrowseFilters();
      } catch (e) {
        alert('Failed to load playlist. Using CORS proxy...');
        try {
          const resp = await fetch(PROXY + encodeURIComponent('https://iptv-org.github.io/iptv/index.m3u'));
          const text = await resp.text();
          allChannels = parseM3U(text);
          buildHomeRows();
          setupBrowseFilters();
        } catch (err) {
          alert('Could not load playlist: ' + err.message);
        }
      }
    }

    // ====================== HOME CATEGORY ROWS ======================
    const CATEGORY_MAP = {
      'Sports': ['sports', 'sport'],
      'Movies': ['movies', 'movie', 'film'],
      'Kids': ['kids', 'child', 'children', 'cartoon'],
      'Music': ['music', 'musical'],
      'News': ['news', 'information'],
      'Documentary': ['documentary', 'docu'],
      'Religion': ['religion', 'religious', 'faith'],
    };

    function getChannelsByCategory(cat) {
      const keys = CATEGORY_MAP[cat] || [cat.toLowerCase()];
      return allChannels.filter(ch => {
        const group = (ch.groupTitle || '').toLowerCase();
        return keys.some(k => group.includes(k));
      });
    }

    function buildHomeRows() {
      const container = document.getElementById('categoryRows');
      container.innerHTML = '';
      const orderedCats = ['Sports','Movies','Kids','Music','News','Documentary','Religion'];
      orderedCats.forEach(cat => {
        const chs = getChannelsByCategory(cat);
        if (chs.length === 0) return;
        const section = document.createElement('div');
        section.className = 'category-section';
        section.innerHTML = `<div class="category-title"><i class="fas fa-tv"></i> ${cat}</div>`;
        const row = document.createElement('div');
        row.className = 'scroll-row';
        chs.slice(0, 30).forEach(ch => {
          row.appendChild(createChannelCard(ch));
        });
        section.appendChild(row);
        container.appendChild(section);
      });
    }

    function createChannelCard(channel) {
      const card = document.createElement('div');
      card.className = 'channel-card';
      card.innerHTML = `
        <img class="card-img" src="${channel.tvgLogo || 'https://via.placeholder.com/200x120/1e3a8a/ffffff?text=TV'}" 
             onerror="this.src='https://via.placeholder.com/200x120/1e3a8a/ffffff?text=TV'">
        <div class="card-body">
          <div class="card-name">${channel.displayName || 'Unknown'}</div>
          <div class="card-meta">
            <span class="ping-status" id="ping-${btoa(channel.url)}"></span>
            <button class="ping-btn" data-url="${channel.url}"><i class="fas fa-sync-alt"></i> Ping</button>
          </div>
        </div>
      `;
      card.addEventListener('click', (e) => {
        if (!e.target.closest('.ping-btn')) {
          playStream(channel.url);
        }
      });
      card.querySelector('.ping-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        pingChannel(channel.url, card.querySelector('.ping-status'));
      });
      return card;
    }

    // ====================== PING LOGIC ======================
    async function pingChannel(url, statusEl) {
      if (pingStatusMap.has(url) && !pingStatusMap.get(url).checking) {
        updatePingUI(statusEl, pingStatusMap.get(url).status);
        return;
      }
      pingStatusMap.set(url, { checking: true, status: null });
      statusEl.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        const resp = await fetch(PROXY + encodeURIComponent(url), { signal: controller.signal });
        clearTimeout(timeout);
        const available = resp.ok;
        pingStatusMap.set(url, { checking: false, status: available ? 'available' : 'unavailable' });
        updatePingUI(statusEl, available ? 'available' : 'unavailable');
      } catch (e) {
        pingStatusMap.set(url, { checking: false, status: 'unavailable' });
        updatePingUI(statusEl, 'unavailable');
      }
    }

    function updatePingUI(el, status) {
      if (status === 'available') {
        el.innerHTML = '<span class="status-available"><i class="fas fa-circle"></i> Available</span>';
      } else {
        el.innerHTML = '<span class="status-unavailable"><i class="fas fa-circle"></i> Unavailable</span>';
      }
    }

    // ====================== BROWSE VIEW ======================
    function setupBrowseFilters() {
      const pillContainer = document.getElementById('categoryPills');
      pillContainer.innerHTML = '';
      const allPill = document.createElement('button');
      allPill.className = 'pill active';
      allPill.textContent = 'All';
      allPill.addEventListener('click', () => {
